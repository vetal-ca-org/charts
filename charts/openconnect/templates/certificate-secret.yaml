{{- if eq (include "openconnect.useCertbot" .) "true" }}
{{- $secretName := include "openconnect.certSecretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- if not $existing }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openconnect.labels" . | nindent 4 }}
type: Opaque
data: {}
{{- end }}
{{- end }}

