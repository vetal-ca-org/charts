{{- if eq (include "openconnect.useCertbot" .) "true" }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "openconnect.certSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openconnect.labels" . | nindent 4 }}
spec:
  secretName: {{ include "openconnect.certSecretName" . }}
  issuerRef:
    kind: {{ .Values.certificate.issuer.kind }}
    name: {{ .Values.certificate.issuer.name }}
  dnsNames:
    - {{ .Values.vpn_address }}
{{- end }}

