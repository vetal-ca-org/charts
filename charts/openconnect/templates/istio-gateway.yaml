{{- if eq (include "openconnect.useIstio" .) "true" }}
{{- $vpnAddress := required "vpn_address must be set when istio.enabled=true" .Values.vpn_address }}
{{- $ns := default .Release.Namespace .Values.istio.namespaceOverride }}
{{- $gatewayName := default (printf "%s-gateway" (include "openconnect.fullname" .)) .Values.istio.gatewayName }}
{{- $selector := default (dict "istio" "ingressgateway") .Values.istio.selector }}
{{- $port := default 443 .Values.istio.port }}
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: {{ $gatewayName }}
  namespace: {{ $ns }}
  labels:
    {{- include "openconnect.labels" . | nindent 4 }}
spec:
  selector:
    {{- toYaml $selector | nindent 4 }}
  servers:
    - port:
        number: {{ $port }}
        name: tls
        protocol: TLS
      tls:
        mode: PASSTHROUGH
      hosts:
        - {{ $vpnAddress | quote }}
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ printf "%s-vs" (include "openconnect.fullname" .) }}
  namespace: {{ $ns }}
  labels:
    {{- include "openconnect.labels" . | nindent 4 }}
spec:
  hosts:
    - {{ $vpnAddress | quote }}
  gateways:
    - {{ $gatewayName }}
  tls:
    - match:
        - port: {{ $port }}
          sniHosts:
            - {{ $vpnAddress | quote }}
      route:
        - destination:
            host: {{ include "openconnect.fullname" . }}
            port:
              number: {{ .Values.service.port }}
{{- end }}

