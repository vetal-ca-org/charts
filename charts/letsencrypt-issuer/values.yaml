# Issuer configuration
issuer:
  name: staging
  # Environment: "staging" or "production"
  # Determines which Let's Encrypt ACME server to use
  environment: staging
  # Optional: Override ACME server URL (if not set, uses URL based on environment)
  # server: ""

# Cert-Manager configuration
certManager:
  # Email address for Let's Encrypt registration
  email: ""
  
  # Cloudflare credentials
  cloudflare:
    # Cloudflare API token/key
    apiKey: ""
    # Cloudflare account email
    email: ""

# DNS zones/domains to be managed by this issuer
domains: []

